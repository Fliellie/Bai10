name: Java CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug Folder Structure
        run: |
          pwd
          ls -R

      - name: Build with Maven
        run: mvn package
      

